<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;

        }
        p{
            display: inline;

        }
        .sizing_box{
           justify-self: center;
            /* display: flex; */
            margin: auto;
            width: 75vw;
            height: 100vh;
            
        }
        .language{
            font-weight: bold;
            align-self: center;
            color:white;  
            border: 3px solid white;
            width: 7vw;
            height: 6vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 2vw;
            border-radius: 5px;
              }
        .middleblock{
            height: 90vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5),rgba(0, 0, 0, 0.5),rgba(0,0,0,0.5)), url('bg.jpg');
            background-size: cover;
        }
        .nav{
            display: flex;
            width: 100vw;
            height: 10vh;
        }
        .signin{
            align-self: center;
            margin-left: 50vw;
            color: white;
            display: flex;
           font-weight: bold;
            justify-content: center;
            align-items: center;
            font-size: 2.4vh;
            background-color: red;
            height: 4.5vh;
            width: 5vw;
            border-radius: 5px;
        }
        .img1{
            height: 4vh;
            margin: 3vh 0 3vh 2vw;
        }
        .get_started{
            display: flex;
           color:White;
           font-size:xx-large;
           font-weight: bold;
           justify-self: center;
           margin-top: 25vh;
        }
        .email_input{
            width: 20vw;
            height: 5vh;
            color:rgba(255, 255, 255, 0.582);
            background-color: rgba(0, 0, 0, 0.582);
            padding-left: 1vw;
            align-content: center;
            display: flex;
        }
        .get_started_buttom{
            color:white;
            background-color:red;
            width:9vw;
            height:6vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 15px;
            font-weight: bold;
            border-radius: 5px;
        }
        
     </style>
</head>
<body>
    <div class="middleblock">
    <div class="sizing_box">
       <div class="nav"><img class="img1" src="logo.svg" alt="Netflix Logo">
        <div class="signin">Sign In</div>
        <div class="language">English</div>
      </div>
      <div class="get_started">Enjoy big movies, hit series and more from ₹149.</div>
      <p style="color: white; display: block; justify-self: center; margin-top: 2vh; font-size: medium;">Join today and cancel anytime.</p>
      <p style="color: white; display: block; justify-self: center; margin-top: 2vh; font-size: medium;">Ready to watch? Enter your email to create an account.</p>
      <div style="display: flex; align-items: center; justify-self: center; margin-top: 10px;">
        <div> <form action="main.html" method="post">
            <input class="email_input" type="email" name="email" placeholder="Email address"></div>
         <div class="get_started_buttom">Get Started<img height="30vh"style="filter:invert(1);" src="arrow-left-5-svgrepo-com.svg"></div>
            </div>
      </div>
    </div>
    </div>
</body>
</html>
